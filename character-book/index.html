<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>キャラ帳</title>

<style>

body{
    font-family:sans-serif;
    background:linear-gradient(
        135deg,
        #ffe6f0,
        #e8e6ff
    );

    margin:0;
    padding:20px;
}

.container{
    max-width:800px;
    margin:auto;
}

h1{
    text-align:center;
    color:#ff8fc4;
}

.card{
    background:white;

    border-radius:20px;

    padding:15px;

    margin-bottom:15px;

    box-shadow:
    0 4px 10px rgba(0,0,0,.1);
}

.name{
    font-size:28px;
    font-weight:bold;
    color:#ff8fc4;
    margin-bottom:8px;
}

.info{
    font-size:14px;
    color:#777;
    margin-bottom:10px;
}

.memo{
    font-size:13px;
    color:#555;
    white-space:pre-wrap;
    margin-bottom:15px;
}

input,
textarea{
    width:100%;

    margin-top:5px;
    margin-bottom:10px;

    padding:8px;

    border-radius:10px;

    border:1px solid #ddd;

    box-sizing:border-box;
}

textarea{
    resize:vertical;
}

.puni{
    background:#ffd6e8;

    border:none;

    border-radius:20px;

    padding:8px 14px;

    cursor:pointer;

    font-weight:bold;

    margin:4px;

    box-shadow:
    0 6px 0 #e9a8c6;
}

.puni:active{
    transform:translateY(4px);

    box-shadow:
    0 2px 0 #e9a8c6;
}

</style>
</head>
<body>

<div class="container">

<h1>📖 キャラ帳</h1>

<button class="puni" onclick="addCharacter()">
＋ 新しいキャラ
</button>

<div id="characterList"></div>

</div>

<script>

let characters = [];
let editingIndex = null;

window.onload = () => {

    characters =
    JSON.parse(
        localStorage.getItem("characters")
        || "[]"
    );

    render();
};

function saveData(){

    localStorage.setItem(
        "characters",
        JSON.stringify(characters)
    );
}

function addCharacter(){

    characters.push({

        name:"",
        gender:"",
        age:"",
        memo:""

    });

    editingIndex = characters.length - 1;

    saveData();
    renderEditScreen();
}

function deleteCharacter(i){

    characters.splice(i,1);

    saveData();
    render();
}

function updateField(i,key,value){

    characters[i][key] = value;

    saveData();
}

function render(){

    characterList.innerHTML = "";

    characters.forEach((c,i)=>{

        const shortMemo =
            c.memo.length > 80
            ? c.memo.slice(0,80) + "..."
            : c.memo;

        characterList.innerHTML += `

        <div class="card">

            <div class="name">
                ${c.name || "名前未設定"}
            </div>

            <div class="info">
                ${c.gender || "性別未設定"}
                ${c.age ? "・" + c.age + "歳" : ""}
            </div>

            <div class="memo">
                ${shortMemo || "メモなし"}
            </div>

            <button
                class="puni"
                onclick="editCharacter(${i})"
            >
                編集
            </button>

            <button
                class="puni"
                onclick="deleteCharacter(${i})"
            >
                削除
            </button>

        </div>

        `;
    });
}

    function renderEditScreen(){

    const c = characters[editingIndex];

    characterList.innerHTML = `

    <div class="card">

        <h2>✏️ キャラ編集</h2>

        <input
            id="editName"
            placeholder="名前"
            value="${c.name}"
        >

        <input
            id="editGender"
            placeholder="性別"
            value="${c.gender}"
        >

        <input
            id="editAge"
            placeholder="年齢"
            value="${c.age}"
        >

        <textarea
            id="editMemo"
            placeholder="メモ"
        >${c.memo}</textarea>

        <button
            class="puni"
            onclick="saveCharacter()"
        >
            保存
        </button>

        <button
            class="puni"
            onclick="cancelEdit()"
        >
            戻る
        </button>

    </div>

    `;
    }
function saveCharacter(){

    const name =
        document.getElementById("editName").value;

    if(name.trim() === ""){
        alert("名前を入力してね！");
        return;
    }

    const c = characters[editingIndex];

    c.name = name;

    c.gender =
        document.getElementById("editGender").value;

    c.age =
        document.getElementById("editAge").value;

    c.memo =
        document.getElementById("editMemo").value;

    saveData();

    editingIndex = null;

    render();
}
function cancelEdit(){

    editingIndex = null;

    render();
}

function editCharacter(i){
    editingIndex = i;
    renderEditScreen();
}



</script>

</body>
</html>
